<nav>

<section class="booking">

<h1>Book Your Dream Trip</h1>

<form onsubmit="return validateForm()">

<input
type="text"
id="name"
placeholder="Enter Your Name">

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="text"
id="phone"
placeholder="Enter Phone Number">

<select id="destination">

<option value="">Select Destination</option>

<option>Paris</option>

<option>Switzerland</option>

<option>Maldives</option>

<option>Dubai</option>

<option>Bali</option>

<option>Goa</option>

</select>

<input
type="date"
id="date">

<input
type="number"
id="persons"
placeholder="Number of Travelers"
min="1">

<textarea
rows="5"
placeholder="Special Requirements"></textarea>

<input
type="submit"
value="Book Now"
class="btn">

</form>

</section>

<footer>

<p>&copy; <span id="year"></span> Explore World Travel. All Rights Reserved.</p>

</footer>

<script src="script.js"></script>

</body>
